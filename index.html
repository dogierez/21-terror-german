
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>21 Terroranschläge & Tragödien</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen" class="screen">
        <div class="content-wrapper">
            <div class="image-box"><img src="logo.jpg" alt="Logo" onerror="this.style.display='none'"></div>
            <button id="btn-start" class="action-btn-large">GESCHICHTEN STARTEN</button>
        </div>
    </div>

    <div id="instructions-screen" class="screen hidden">
        <div class="content-wrapper">
            <div class="image-box"><img src="instructions.png" alt="Anleitung" onerror="this.style.display='none'"></div>
            <button id="btn-enter" class="action-btn-large">APP BETRETEN</button>
        </div>
    </div>

    <div id="main-app" class="screen hidden">
        <div id="total-score-display">Gesamtpunkte: <span id="points-val">0</span></div>
        <h1 id="app-title" style="color: #ccff00; font-size: 36px; margin-bottom: 20px;">Terroranschläge & Tragödien</h1>
        <div id="stations-grid" class="grid-container"></div>
        
        <div id="player-zone" class="hidden">
            <h2 id="now-playing-title" style="color:#ccff00; font-size: 32px; margin-bottom: 20px;"></h2>
            
            <div class="audio-controls">
                <button id="ctrl-play" class="ctrl-btn">▶ PLAY</button>
                <button id="ctrl-pause" class="ctrl-btn">⏸ PAUSE</button>
                <button id="ctrl-stop" class="ctrl-btn">⏹ STOPP</button>
            </div>
            
            <div class="learning-buttons">
                <button id="btn-blind" class="mode-btn neon-blue">🎧 BLIND HÖREN</button>
                <button id="btn-read" class="mode-btn neon-green">📖 HÖREN & LESEN</button>
                <button id="btn-game" class="mode-btn neon-pink">🎮 PAARE FINDEN</button>
                <button id="btn-bowling" class="mode-btn neon-yellow">🎳 BOWLING-QUIZ</button>
            </div>
            
            <div id="game-zone" class="hidden">
                <div id="game-board"></div>
                <div id="quiz-feedback-area"></div>
            </div>
            
            <div id="transcript-box" class="hidden"></div>
            
            <button id="btn-back" class="back-btn">⬅ ZURÜCK ZUR LISTE</button>
        </div>
    </div>

    <div id="translation-popup" class="hidden"></div>
    <audio id="audio-player"></audio>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
